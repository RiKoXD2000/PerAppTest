name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  build:
    name: Compilar APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔑 Dar permisos a Gradle
        run: chmod +x gradlew

      - name: 📥 Descargar Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -Lo gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: 🔧 Compilar APK debug
        run: ./gradlew assembleDebug --stacktrace

      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: PerchanceChat-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30   # se guarda 30 días en GitHub
